    <script> 
        tailwind.config = {

                extend: {

    <style type="text/tailwindcss"> 
        @layer utilities { 
            .weather-card { @apply bg-white rounded-lg shadow-sm border border-gray-200; } 
            .forecast-day { @apply w-28 py-3 border-r border-gray-100 last:border-0 flex flex-col items-center justify-center text-center; } 
            .mmc-icon { @apply w-20 h-16 my-2 object-contain; }
            .forecast-outlook { @apply p-4 bg-secondary border-b border-gray-200 rounded-t-lg; } 
            .forecast-container { @apply flex min-w-max justify-center; } 
            .seven-day-temp { @apply text-red-600; } 
            .nav-link { @apply px-4 py-3 text-white hover:bg-primary/80 transition-colors duration-300; }
            .mobile-menu { @apply absolute top-full left-0 right-0 bg-white shadow-lg py-2 z-50 border-t border-gray-200; } 
            .mobile-menu-hidden { @apply hidden; } 
            .weather-draft-btn { @apply bg-primary text-white px-4 py-2 rounded hover:bg-primary/90 transition-all shadow-sm text-sm; } 
            .update-badge { @apply bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-2; }
            .weather-section { @apply mb-6; }
            .date-tag { @apply font-semibold text-lg mb-3 text-gray-800 bg-primary/10 px-3 py-2 rounded inline-block; }
            .model-card { @apply bg-white rounded-lg shadow-md p-5 mb-6; }
            .select-container { @apply relative w-64 mx-auto mb-4; }
            .select-box { @apply border border-gray-300 rounded-md p-3 flex justify-between items-center cursor-pointer bg-white; }
            .select-dropdown { @apply absolute w-full bg-white border border-gray-300 rounded-md mt-1 z-10; }
            .select-option { @apply p-3 hover:bg-gray-100 cursor-pointer; }
            /* 核心修改：限制圖片最大寬度，保持比例縮放 */
            .model-img { @apply w-full max-w-4xl mx-auto h-auto rounded-md shadow; }
        } 
        
        body { 
            background-color: #f8f9fa; 
            font-family: "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6;
        } 

        header { position: relative; z-index: 999; } 
        h1 { letter-spacing: 1px; }
        .radar-iframe {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        @media (max-width: 768px) {
            .nav-link {
                padding: 12px 16px;
                display: block;
            }
            .nav-container ul {
                flex-direction: column;
            }
            /* 手機端進一步縮小圖片最大寬度 */
            .model-img {
                max-width: 100%;
            }
        }
    </style> 
</head>

    <nav class="bg-nav nav-container relative">
        <div id="mobileMenu" class="mobile-menu mobile-menu-hidden md:hidden">

        <!-- 桌面端导航 -->
        <div class="container mx-auto px-4 hidden md:block">

                <li><a href="index.html" class="nav-link inline-block font-medium">首頁</a></li>
                <li><a href="TC.html" class="nav-link inline-block font-medium">熱帶氣旋資訊</a></li>
                <li><a href="model.html" class="nav-link inline-block font-medium">各大模式預報</a></li>

    <main class="container mx-auto px-4 py-6">

        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0 text-center md:text-left">
                    <p class="text-lg font-bold">粵港澳天氣站 (GHMWS)</p>

                </div>

        </div>
    </footer>

<script>
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('mobile-menu-hidden');
    });

    const selectBox = document.getElementById('selectBox');
    const selectDropdown = document.getElementById('selectDropdown');
    const selectText = document.getElementById('selectText');
    const trackImg = document.getElementById('trackImg');
    const intensityImg = document.getElementById('intensityImg');
    const options = document.querySelectorAll('.select-option');

    selectBox.addEventListener('click', () => {
        selectDropdown.classList.toggle('hidden');
    });

    options.forEach(opt => {
        opt.addEventListener('click', () => {
            const t = opt.dataset.type;
            selectText.textContent = opt.textContent;
            selectDropdown.classList.add('hidden');
            
            trackImg.src = `TC-Track/TC-Track-${t}.png`;
            intensityImg.src = `TC-Track/TC-Intensity-${t}.png`;
            trackImg.alt = `${opt.textContent} 路徑`;
            intensityImg.alt = `${opt.textContent} 強度`;
        });
    });

    document.addEventListener('click', (e) => {
        if (!selectBox.contains(e.target)) selectDropdown.classList.add('hidden');
    });
</script>
</body>
</html>
